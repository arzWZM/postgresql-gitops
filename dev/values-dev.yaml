# Container image configuration
namespace: testing-postgres
image:
  registry: docker.io
  repository: bitnamilegacy/postgresql
  tag: 17.6.0-debian-12-r4

# Authentication
auth:
  username: "dev"  
  database: "postgres"
  #existingSecret: postgresql-credentials  
# PostgreSQL primary instance configuration
primary:
  # pg_hba.conf - Client authentication configuration
  pgHbaConfiguration: |-  
    local   all             all                                     trust
    host    all             all             127.0.0.1/32            trust
    host    all             all             ::1/128                 trust
    local   replication     all                                     trust
    host    replication     all             127.0.0.1/32            trust
    host    replication     all             ::1/128                 trust
    host    all             all             10.0.0.0/8              trust
    host    all             all             192.168.0.0/16          trust
  # PostgreSQL advanced configuration
  extendedConfiguration: |-  
    wal_level = logical
    max_replication_slots = 10
    max_wal_senders = 10
    max_connections = 200
  # Resource limits (smaller for dev)
  resources:  
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1024Mi
  # Database initialization scripts
  initdb:  
    scripts:
      create-databases.sql: |
        CREATE DATABASE service_foundry;
        GRANT ALL PRIVILEGES ON DATABASE service_foundry TO dev;
        CREATE DATABASE keycloak;
        GRANT ALL PRIVILEGES ON DATABASE keycloak TO dev;
